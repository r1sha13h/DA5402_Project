global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["alertmanager:9093"]

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: "spendsense_backend"
    static_configs:
      - targets: ["backend:8000"]
    metrics_path: /metrics
    scrape_interval: 10s

  - job_name: "pushgateway"
    static_configs:
      - targets: ["pushgateway:9091"]
    honor_labels: true

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
