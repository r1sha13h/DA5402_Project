groups:

  # ── Inference / API alerts ──────────────────────────────────────────────────
  - name: spendsense_inference
    rules:
      - alert: HighErrorRate
        expr: spendsense_error_rate > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "SpendSense high error rate"
          description: >
            Error rate is {{ $value | humanizePercentage }} over the last
            100 requests (threshold: 5%).

      - alert: ModelNotLoaded
        expr: spendsense_model_loaded == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "SpendSense prediction model is not loaded"
          description: >
            The model has been unavailable for more than 1 minute.
            Check backend logs and /ready endpoint.

      - alert: HighPredictionLatency
        expr: >
          histogram_quantile(0.95,
            rate(spendsense_request_latency_seconds_bucket{endpoint="/predict"}[5m])
          ) > 0.5
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SpendSense high p95 prediction latency"
          description: >
            95th-percentile latency on /predict is
            {{ $value | humanizeDuration }} (threshold: 500 ms).

  # ── Training / DVC pipeline alerts ─────────────────────────────────────────
  - name: spendsense_training
    rules:
      - alert: LowTestF1
        expr: spendsense_test_f1_macro < 0.70
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "SpendSense test F1 below acceptance threshold"
          description: >
            Test macro F1 = {{ $value | humanize }} (threshold: 0.70).
            Model should not be promoted to production.

      - alert: LowValF1
        expr: spendsense_training_val_f1 < 0.65
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "SpendSense training validation F1 below expected"
          description: >
            Best validation F1 = {{ $value | humanize }} (expected ≥ 0.65).
            Consider tuning hyperparameters.

      - alert: TrainingDurationHigh
        expr: spendsense_training_duration_seconds > 7200
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "SpendSense training took unusually long"
          description: >
            Training completed in {{ $value | humanizeDuration }}
            (threshold: 2 hours). Check for data size increase or resource issues.

  # ── Pipeline / data quality alerts ─────────────────────────────────────────
  - name: spendsense_pipeline
    rules:
      - alert: DataDriftDetected
        expr: spendsense_pipeline_drift_detected == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "SpendSense Airflow detected category distribution drift"
          description: >
            Airflow drift check flagged a category shift > 10 percentage points.
            Review GET /drift and consider scheduling a retraining run.

      - alert: IngestFailed
        expr: spendsense_pipeline_ingest_success == 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "SpendSense Airflow ingest task failed"
          description: >
            The ingestion pipeline did not complete successfully.
            Check Airflow logs at http://localhost:8080.

      - alert: FeedbackLoopDead
        expr: increase(spendsense_feedback_total[24h]) == 0
        for: 48h
        labels:
          severity: warning
        annotations:
          summary: "No feedback collected in the last 24 hours"
          description: >
            The feedback loop appears inactive. Check POST /feedback
            is reachable and the frontend is operational.

  # ── Tail latency and traffic alerts ────────────────────────────────────────
  - name: spendsense_traffic
    rules:
      - alert: TailLatencySpike
        expr: >
          histogram_quantile(0.99,
            rate(spendsense_request_latency_seconds_bucket{endpoint="/predict"}[5m])
          ) > 1.0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "SpendSense P99 latency > 1s on /predict"
          description: >
            99th-percentile latency is {{ $value | humanizeDuration }}
            (threshold: 1 s). Possible resource contention or model issue.

      - alert: FrequentModelSwitch
        expr: increase(spendsense_model_switches_total[1h]) > 3
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "SpendSense model hot-swapped > 3 times in 1 hour"
          description: >
            Frequent model switching may indicate instability or
            misconfiguration. Review POST /models/switch call patterns.
