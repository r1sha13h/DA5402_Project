global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 12h
  receiver: 'null'
  routes:
    - match:
        severity: critical
      receiver: 'null'
      repeat_interval: 1h
    - match:
        severity: warning
      receiver: 'null'
      repeat_interval: 6h

# Placeholder receiver — replace with email/Slack/PagerDuty in production:
#
#   - name: 'slack'
