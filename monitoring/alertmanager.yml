global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'rishabh.mishra.cer16@itbhu.ac.in'
  smtp_auth_username: 'rishabh.mishra.cer16@itbhu.ac.in'
  smtp_auth_password: '${ALERTMANAGER_SMTP_PASSWORD}'
  smtp_require_tls: true

route:
  group_by: ['alertname', 'severity']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 15m
  receiver: 'email'
  routes:
    - match:
        severity: critical
      receiver: 'email'
      repeat_interval: 15m
    - match:
        severity: warning
      receiver: 'email'
      repeat_interval: 15m

receivers:
  - name: 'email'
    email_configs:
      - to: 'rishabh.mishra.cer16@itbhu.ac.in'
        send_resolved: true
        headers:
          Subject: '[SpendSense] {{ .Status | toUpper }} — {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          Alert:    {{ .Annotations.summary }}
          Severity: {{ .Labels.severity }}
          Details:  {{ .Annotations.description }}
          Fired at: {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}
          {{ end }}

  # No-op receiver — use as default if SMTP is not available.
  - name: 'null'

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
