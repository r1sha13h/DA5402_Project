name: SpendSense CI/CD

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_full_pipeline:
        description: "Run full DVC pipeline (train + evaluate)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

# ── Defaults ──────────────────────────────────────────────────────────────────
defaults:
  run:
    shell: bash

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint + Unit Tests ───────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: self-hosted          # LOCAL runner required (no cloud allowed)
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          flake8 src/ backend/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__ \
            --count --statistics

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=60

  # ── Job 2: ML Pipeline + Infrastructure ────────────────────────────────────
  ml-pipeline:
    name: ML Pipeline + Infra Services
    runs-on: self-hosted
    needs: test
    if: >
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' && inputs.run_full_pipeline == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Activate project venv
        run: |
          source /home/rishabh/Documents/IITM/MLOps/Project/DA5402_Project/venv/bin/activate
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"

      - name: Verify CUDA availability
        run: |
          python -c "import torch; assert torch.cuda.is_available(), 'CUDA not available'; print(f'GPU: {torch.cuda.get_device_name(0)}')"

      - name: Verify raw data exists
        run: |
          test -f data/raw/transactions.csv || (echo "FAIL: data/raw/transactions.csv not found" && exit 1)
          echo "Raw data found: $(wc -l < data/raw/transactions.csv) lines"

      - name: DVC pull cached stages
        run: dvc pull --run-cache || echo "No remote cache available, running from scratch"

      - name: Run DVC pipeline (train once)
        env:
          MLFLOW_TRACKING_URI: mlruns
        run: dvc repro

      - name: Check evaluation metrics
        run: |
          python - <<'EOF'
          import json, sys
          with open("metrics/eval_metrics.json") as f:
              m = json.load(f)
          f1 = m.get("test_f1_macro", 0)
          acc = m.get("test_accuracy", 0)
          print(f"Test F1 (macro): {f1:.4f}")
          print(f"Test accuracy:   {acc:.4f}")
          if f1 < 0.70:
              print(f"FAIL: test_f1_macro={f1:.4f} below threshold 0.70")
              sys.exit(1)
          print("PASS: metrics meet acceptance criteria.")
          EOF

      - name: Build infra Docker images
        run: docker compose build mlflow airflow prometheus grafana

      - name: Start infra services
        run: docker compose up -d mlflow airflow prometheus grafana

      - name: Wait for MLflow to be healthy
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5000/health > /dev/null 2>&1; then
              echo "MLflow is healthy."
              break
            fi
            echo "Waiting for MLflow... ($i/30)"
            sleep 5
          done

      - name: Smoke test — MLflow
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health)
          [ "$STATUS" == "200" ] || (echo "MLflow health check failed: HTTP $STATUS" && exit 1)
          echo "MLflow smoke test PASSED."

      - name: Smoke test — Prometheus
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9090/-/healthy)
          [ "$STATUS" == "200" ] || (echo "Prometheus health check failed: HTTP $STATUS" && exit 1)
          echo "Prometheus smoke test PASSED."

      - name: Smoke test — Grafana
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health)
          [ "$STATUS" == "200" ] || (echo "Grafana health check failed: HTTP $STATUS" && exit 1)
          echo "Grafana smoke test PASSED."

      - name: Smoke test — Airflow
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health)
            if [ "$STATUS" == "200" ]; then
              echo "Airflow smoke test PASSED."
              break
            fi
            echo "Waiting for Airflow... ($i/30)"
            sleep 10
          done

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts
          path: |
            models/
            data/processed/
            metrics/
            mlruns/
            params.yaml
          retention-days: 1

      - name: Push DVC artifacts to cache
        run: dvc push || echo "No DVC remote configured, skipping push"

  # ── Job 3: Streamlit + FastAPI ────────────────────────────────────────────
  app:
    name: Streamlit & FastAPI Smoke Tests
    runs-on: self-hosted
    needs: ml-pipeline
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download pipeline artifacts from Job 2
        uses: actions/download-artifact@v4
        with:
          name: pipeline-artifacts

      - name: Build app Docker images
        run: docker compose build backend frontend

      - name: Start app services (backend + frontend)
        run: docker compose up -d backend frontend

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend is ready."
              break
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 5
          done

      - name: Smoke test — /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          [ "$STATUS" == "200" ] || (echo "Health check failed: HTTP $STATUS" && exit 1)
          echo "Backend /health PASSED."

      - name: Smoke test — /ready
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ready)
          [ "$STATUS" == "200" ] || echo "Ready check HTTP $STATUS (model may still be loading)"

      - name: Smoke test — /predict
        run: |
          RESP=$(curl -s -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"description": "Zomato food delivery payment"}')
          echo "$RESP"
          echo "$RESP" | python -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'predicted_category' in d, 'Missing predicted_category'
          assert 'confidence' in d, 'Missing confidence'
          print('Prediction smoke test PASSED.')
          "

      - name: Smoke test — /models (model listing)
        run: |
          RESP=$(curl -sf http://localhost:8000/models)
          echo "$RESP"
          echo "Model listing smoke test PASSED."

      - name: Smoke test — /metrics (Prometheus)
        run: |
          curl -sf http://localhost:8000/metrics | grep "spendsense_" || \
            (echo "Prometheus metrics not found" && exit 1)
          echo "Prometheus metrics PASSED."

      - name: Smoke test — Streamlit frontend
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8501)
          [ "$STATUS" == "200" ] || (echo "Streamlit health check failed: HTTP $STATUS" && exit 1)
          echo "Streamlit frontend PASSED."

      - name: Tear down all services
        if: always()
        run: docker compose down -v
