name: SpendSense CI/CD

# ── Triggers ──────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run_full_pipeline:
        description: "Run full DVC pipeline (train + evaluate)"
        required: false
        default: "false"
        type: choice
        options: ["true", "false"]

# ── Defaults ──────────────────────────────────────────────────────────────────
defaults:
  run:
    shell: bash

# ── Jobs ──────────────────────────────────────────────────────────────────────
jobs:

  # ── Job 1: Lint + Unit Tests ───────────────────────────────────────────────
  test:
    name: Lint & Unit Tests
    runs-on: self-hosted
    steps:
      - name: Remove root-owned workspace files (via Docker)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace alpine \
            sh -c "rm -rf /workspace/mlruns" 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Activate project venv
        run: |
          source /home/rishabh/Documents/IITM/MLOps/Project/DA5402_Project/venv/bin/activate
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"

      - name: Lint with flake8
        run: |
          flake8 src/ backend/ tests/ \
            --max-line-length=100 \
            --exclude=__pycache__ \
            --count --statistics

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src --cov=backend \
            --cov-report=term-missing \
            --cov-fail-under=60

  # ── Job 2: ML Pipeline + Infra Services ───────────────────────────────────
  # Merges old jobs 2 & 3 — training happens exactly once here.
  ml-pipeline:
    name: ML Pipeline + Infra Services
    runs-on: self-hosted
    needs: test
    if: >
      github.ref == 'refs/heads/main' ||
      github.event_name == 'workflow_dispatch' && inputs.run_full_pipeline == 'true'
    env:
      ALERTMANAGER_SMTP_PASSWORD: ${{ secrets.ALERTMANAGER_SMTP_PASSWORD }}
      GITHUB_PAT: ${{ secrets.GH_PAT }}
    steps:
      - name: Remove root-owned workspace files (via Docker)
        run: |
          docker run --rm -v "$GITHUB_WORKSPACE":/workspace alpine \
            sh -c "rm -rf /workspace/mlruns" 2>/dev/null || true

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Tear down any leftover containers
        run: docker compose down --remove-orphans || true

      - name: Activate project venv
        run: |
          source /home/rishabh/Documents/IITM/MLOps/Project/DA5402_Project/venv/bin/activate
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"

      - name: Export host UID/GID for docker-compose
        run: |
          echo "HOST_UID=$(id -u)" >> "$GITHUB_ENV"
          echo "HOST_GID=$(id -g)" >> "$GITHUB_ENV"

      - name: Verify torch + CUDA GPU
        run: |
          echo "=== nvidia-smi ==="
          nvidia-smi || echo "nvidia-smi failed — driver may be unresponsive"
          echo "=== CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-<unset>} ==="
          # Unset in case something set it to empty/invalid
          unset CUDA_VISIBLE_DEVICES
          python -c "
          import os, torch
          print(f'torch={torch.__version__}')
          print(f'CUDA_VISIBLE_DEVICES={os.environ.get(\"CUDA_VISIBLE_DEVICES\", \"<unset>\")}')
          assert torch.cuda.is_available(), 'FAIL: CUDA GPU not available — training requires a GPU.'
          print(f'CUDA={torch.version.cuda}, GPU={torch.cuda.get_device_name(0)}')
          print('CUDA GPU verified.')
          "

      - name: Ensure raw data exists
        run: |
          RUNNER_DATA="/home/rishabh/Documents/IITM/MLOps/Project/DA5402_Project/data/raw/transactions.csv"
          if [ ! -f data/raw/transactions.csv ]; then
            if [ -f "$RUNNER_DATA" ]; then
              echo "Copying raw data from runner project directory..."
              mkdir -p data/raw
              cp "$RUNNER_DATA" data/raw/transactions.csv
            else
              echo "FAIL: data/raw/transactions.csv not found on runner." && exit 1
            fi
          fi
          echo "Raw data ready: $(wc -l < data/raw/transactions.csv) lines"

      - name: Create 90-10 drift split
        run: |
          mkdir -p data/raw data/drift
          python scripts/create_drift_split.py --raw data/raw/transactions.csv --verify
          # Use 90% split as baseline for first DVC run
          cp data/raw/transactions_90.csv data/raw/transactions.csv
          echo "Using 90% split for first DVC run: $(wc -l < data/raw/transactions.csv) rows"

      - name: Restore feedback.jsonl from project directory
        run: |
          PROJ_FEEDBACK="/home/rishabh/Documents/IITM/MLOps/Project/DA5402_Project/feedback/feedback.jsonl"
          mkdir -p feedback
          if [ -f "$PROJ_FEEDBACK" ]; then
            cp "$PROJ_FEEDBACK" feedback/feedback.jsonl
            echo "Restored $(wc -l < feedback/feedback.jsonl) feedback entries."
          else
            echo '[]' > feedback/feedback.jsonl || touch feedback/feedback.jsonl
            echo "No prior feedback.jsonl found — starting fresh."
          fi

      - name: Build infra Docker images
        run: docker compose build mlflow alertmanager pushgateway prometheus grafana

      - name: Pre-create mlruns directory (owned by runner user)
        run: mkdir -p mlruns/artifacts

      - name: Start infra services (before DVC pipeline)
        run: docker compose up -d mlflow alertmanager pushgateway prometheus grafana

      - name: Wait for MLflow to be healthy
        run: |
          for i in $(seq 1 30); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null) || STATUS="000"
            if [ "$STATUS" == "200" ]; then
              echo "MLflow is healthy."
              break
            fi
            echo "Waiting for MLflow... ($i/30)"
            sleep 5
          done

      - name: Smoke test — MLflow
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:5000/health 2>/dev/null) || STATUS="000"
          [ "$STATUS" == "200" ] || (echo "MLflow health check failed: HTTP $STATUS" && exit 1)
          echo "MLflow smoke test PASSED."

      - name: Smoke test — Prometheus
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9090/-/healthy 2>/dev/null) || STATUS="000"
          [ "$STATUS" == "200" ] || (echo "Prometheus health check failed: HTTP $STATUS" && exit 1)
          echo "Prometheus smoke test PASSED."

      - name: Smoke test — Grafana
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/api/health 2>/dev/null) || STATUS="000"
          [ "$STATUS" == "200" ] || (echo "Grafana health check failed: HTTP $STATUS" && exit 1)
          echo "Grafana smoke test PASSED."

      - name: Wait for Alertmanager to be healthy
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9093/-/healthy 2>/dev/null) || STATUS="000"
            if [ "$STATUS" == "200" ]; then
              echo "Alertmanager is healthy."
              break
            fi
            echo "Waiting for Alertmanager... ($i/20) [HTTP $STATUS]"
            sleep 5
          done

      - name: Smoke test — Alertmanager
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9093/-/healthy 2>/dev/null) || STATUS="000"
          if [ "$STATUS" == "200" ]; then
            echo "Alertmanager smoke test PASSED."
          else
            echo "WARNING: Alertmanager health check returned HTTP $STATUS — email alerts may not work."
          fi

      - name: Smoke test — Pushgateway
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:9091/-/healthy 2>/dev/null) || STATUS="000"
          [ "$STATUS" == "200" ] || (echo "Pushgateway health check failed: HTTP $STATUS" && exit 1)
          echo "Pushgateway smoke test PASSED."

      - name: Restore MLflow runs from project directory
        run: |
          PROJ_MLRUNS="/home/rishabh/Documents/IITM/MLOps/Project/DA5402_Project/mlruns"
          if [ -d "$PROJ_MLRUNS" ] && [ "$(ls -A "$PROJ_MLRUNS" 2>/dev/null)" ]; then
            echo "Restoring mlruns from $PROJ_MLRUNS ..."
            cp -a "$PROJ_MLRUNS/." mlruns/
            echo "Restored $(find mlruns -name '*.json' | wc -l) run metadata files."
          else
            echo "No prior mlruns found at $PROJ_MLRUNS — starting fresh."
          fi

      - name: DVC pull cached stages
        run: dvc pull --run-cache || echo "No remote cache available, running from scratch"

      - name: Run DVC pipeline — Run 1 (ingest → preprocess → train → evaluate on 90% data)
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
          PUSHGATEWAY_URL: http://localhost:9091
        run: dvc repro

      - name: Preserve Run-1 model for fine-tuning
        run: |
          cp models/latest_model.pt models/run1_model.pt
          echo "Run-1 model saved for fine-tuning."

      - name: Verify Prometheus received training metrics
        run: |
          echo "Waiting for Prometheus to scrape Pushgateway..."
          sleep 20
          for metric in spendsense_training_val_f1 spendsense_test_f1_macro spendsense_test_accuracy spendsense_training_duration_seconds; do
            RESULT=$(curl -s "http://localhost:9090/api/v1/query?query=${metric}" | python -c "
          import json, sys
          d = json.load(sys.stdin)
          results = d.get('data', {}).get('result', [])
          print(len(results))
          ")
            if [ "$RESULT" -gt 0 ]; then
              echo "  PASS: ${metric} found in Prometheus (${RESULT} series)"
            else
              echo "  WARN: ${metric} not yet in Prometheus (may still be scraping)"
            fi
          done

      - name: Check evaluation metrics (Run 1 — 90% baseline)
        run: |
          python - <<'EOF'
          import json, sys
          with open("metrics/eval_metrics.json") as f:
              m = json.load(f)
          f1 = m.get("test_f1_macro", 0)
          acc = m.get("test_accuracy", 0)
          print(f"Test F1 (macro): {f1:.4f}")
          print(f"Test accuracy:   {acc:.4f}")
          if f1 < 0.70:
              print(f"FAIL: test_f1_macro={f1:.4f} below threshold 0.70")
              sys.exit(1)
          print("PASS: metrics meet acceptance criteria.")
          EOF

      - name: Push DVC artifacts to cache
        run: dvc push || echo "No DVC remote configured, skipping push"

      - name: Build Airflow Docker image
        run: docker compose build airflow

      - name: Start Airflow service
        run: docker compose up -d airflow

      - name: Wait for Airflow to be healthy
        run: |
          for i in $(seq 1 60); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health 2>/dev/null) || STATUS="000"
            if [ "$STATUS" == "200" ]; then
              echo "Airflow is healthy."
              break
            fi
            echo "Waiting for Airflow... ($i/60) [HTTP $STATUS]"
            sleep 10
          done

      - name: Smoke test — Airflow
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/health 2>/dev/null) || STATUS="000"
            [ "$STATUS" == "200" ] && echo "Airflow smoke test PASSED." && exit 0
            echo "Attempt $i/3: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Airflow health check failed after 3 attempts: HTTP $STATUS" && exit 1

      - name: Trigger Airflow DAG (drift detection + combine_data)
        env:
          GITHUB_ACTIONS: "true"
        run: |
          AUTH=$(echo -n 'admin:admin' | base64)
          RUN_ID="ci_run_$(date +%s)"
          TRIGGER=$(curl -s -X POST \
            "http://localhost:8080/api/v1/dags/spendsense_ingestion_pipeline/dagRuns" \
            -H "Content-Type: application/json" \
            -H "Authorization: Basic $AUTH" \
            -d "{\"dag_run_id\": \"$RUN_ID\"}")
          echo "Trigger response: $TRIGGER"
          STATE=""
          for i in $(seq 1 60); do
            RESP=$(curl -s \
              "http://localhost:8080/api/v1/dags/spendsense_ingestion_pipeline/dagRuns/$RUN_ID" \
              -H "Authorization: Basic $AUTH")
            STATE=$(echo "$RESP" | python -c \
              "import json,sys; d=json.load(sys.stdin); print(d.get('state','unknown'))" 2>/dev/null || echo "unknown")
            echo "DAG state: $STATE ($i/60)"
            [ "$STATE" = "success" ] && echo "Airflow DAG completed successfully." && break
            [ "$STATE" = "failed"  ] && echo "WARNING: Airflow DAG failed — proceeding with combined data if written." && break
            sleep 10
          done
          # Verify combined transactions.csv was written by combine_data task
          if [ -f data/raw/transactions.csv ]; then
            echo "Combined data ready: $(wc -l < data/raw/transactions.csv) rows"
          else
            echo "WARNING: data/raw/transactions.csv not updated by Airflow — using 90%+10% merge fallback."
            cat data/raw/transactions_90.csv > data/raw/transactions.csv
            tail -n +2 data/drift/transactions_drift.csv >> data/raw/transactions.csv
            echo "Fallback combined: $(wc -l < data/raw/transactions.csv) rows"
          fi

      - name: Run DVC pipeline — Run 2 (fine-tune on 90%+10%+feedback for 1 epoch)
        env:
          MLFLOW_TRACKING_URI: http://localhost:5000
          PUSHGATEWAY_URL: http://localhost:9091
          FINETUNE_MODEL_PATH: models/run1_model.pt
        run: dvc repro --force

      - name: Save MLflow runs back to project directory
        run: |
          PROJ_MLRUNS="/home/rishabh/Documents/IITM/MLOps/Project/DA5402_Project/mlruns"
          echo "Saving mlruns to $PROJ_MLRUNS ..."
          mkdir -p "$PROJ_MLRUNS"
          cp -a mlruns/. "$PROJ_MLRUNS/"
          echo "Saved $(find "$PROJ_MLRUNS" -name '*.json' | wc -l) run metadata files."

      - name: Persist feedback.jsonl to project directory
        run: |
          PROJ_FEEDBACK="/home/rishabh/Documents/IITM/MLOps/Project/DA5402_Project/feedback"
          mkdir -p "$PROJ_FEEDBACK"
          if [ -f feedback/feedback.jsonl ]; then
            cp feedback/feedback.jsonl "$PROJ_FEEDBACK/feedback.jsonl"
            echo "Saved $(wc -l < feedback/feedback.jsonl) feedback entries."
          else
            echo "No feedback.jsonl to persist."
          fi

      - name: Upload pipeline artifacts
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-artifacts
          path: |
            models/
            data/processed/
            metrics/
            mlruns/
            params.yaml
          retention-days: 1

  # ── Job 3: Streamlit + FastAPI ────────────────────────────────────────────
  # Uses artifacts from Job 2 — no retraining.
  app:
    name: Streamlit & FastAPI Smoke Tests
    runs-on: self-hosted
    needs: ml-pipeline
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download pipeline artifacts from Job 2
        uses: actions/download-artifact@v4
        with:
          name: pipeline-artifacts

      - name: Activate project venv
        run: |
          source /home/rishabh/Documents/IITM/MLOps/Project/DA5402_Project/venv/bin/activate
          echo "PATH=$PATH" >> "$GITHUB_ENV"
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"

      - name: Build app Docker images
        run: docker compose build backend frontend

      - name: Start app services
        run: docker compose up -d backend frontend

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8000/health > /dev/null; then
              echo "Backend is ready."
              break
            fi
            echo "Waiting for backend... ($i/60)"
            sleep 5
          done

      - name: Smoke test — /health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health)
          [ "$STATUS" == "200" ] || (echo "Health check failed: HTTP $STATUS" && exit 1)
          echo "Backend /health PASSED."

      - name: Smoke test — /ready
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/ready)
          [ "$STATUS" == "200" ] || echo "Ready check HTTP $STATUS (model may still be loading)"

      - name: Smoke test — /predict
        run: |
          RESP=$(curl -s -X POST http://localhost:8000/predict \
            -H "Content-Type: application/json" \
            -d '{"description": "Arby'\''s Contactless"}')
          echo "$RESP"
          echo "$RESP" | python -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'predicted_category' in d, 'Missing predicted_category'
          assert 'confidence' in d, 'Missing confidence'
          print('Prediction smoke test PASSED.')
          "

      - name: Smoke test — /models (MLflow run listing)
        run: |
          RESP=$(curl -sf http://localhost:8000/models)
          echo "$RESP"
          echo "$RESP" | python -c "
          import json, sys
          d = json.load(sys.stdin)
          assert 'runs' in d, 'Missing runs list'
          print(f'Model listing PASSED — {len(d[\"runs\"])} run(s) available.')
          "

      - name: Smoke test — /metrics (Prometheus)
        run: |
          curl -sf http://localhost:8000/metrics | grep "spendsense_" || \
            (echo "Prometheus metrics not found" && exit 1)
          echo "Prometheus metrics PASSED."

      - name: Smoke test — Streamlit frontend
        run: |
          for i in $(seq 1 20); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8501 2>/dev/null) || STATUS="000"
            [ "$STATUS" == "200" ] && echo "Streamlit frontend PASSED." && exit 0
            echo "Waiting for Streamlit... ($i/20) [HTTP $STATUS]"
            sleep 5
          done
          echo "Streamlit health check failed after 20 attempts: HTTP $STATUS" && exit 1

      - name: Tear down all services
        if: always()
        run: docker compose down
