stages:
  ingest:
    cmd: python -u src/data/ingest.py
    deps:
      - src/data/ingest.py
      - data/raw/transactions.csv
    params:
      - data.raw_path
      - data.ingested_path
    outs:
      - data/ingested/transactions.csv
      - data/ingested/baseline_stats.json

  preprocess:
    cmd: python -u src/data/preprocess.py
    deps:
      - src/data/preprocess.py
      - data/ingested/transactions.csv
    params:
      - preprocess
      - data.ingested_path
      - data.processed_dir
    outs:
      - data/processed/X_train.npy
      - data/processed/X_val.npy
      - data/processed/X_test.npy
      - data/processed/y_train.npy
      - data/processed/y_val.npy
      - data/processed/y_test.npy
      - data/processed/vocab.pkl
      - data/processed/label_encoder.pkl
      - data/processed/feature_baseline.json

  train:
    cmd: python -u src/models/train.py
    deps:
      - src/models/train.py
      - src/models/model.py
      - data/processed/X_train.npy
      - data/processed/X_val.npy
      - data/processed/y_train.npy
      - data/processed/y_val.npy
      - data/processed/vocab.pkl
      - data/processed/label_encoder.pkl
    params:
      - train
      - data.processed_dir
    outs:
      - models/latest_model.pt
    metrics:
      - metrics/train_metrics.json:
          cache: false

  evaluate:
    cmd: python -u src/models/evaluate.py
    deps:
      - src/models/evaluate.py
      - src/models/model.py
      - models/latest_model.pt
      - data/processed/X_test.npy
      - data/processed/y_test.npy
      - data/processed/vocab.pkl
      - data/processed/label_encoder.pkl
    params:
      - train
      - data.processed_dir
    metrics:
      - metrics/eval_metrics.json:
          cache: false
