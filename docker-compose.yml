# named volumes
volumes:
  airflow_db:
  prometheus_data:
  grafana_data:
  pushgateway_data:

# bridge network shared by all services
networks:
  spendsense:
    driver: bridge

services:

  # mlflow tracking server (port 5000)
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.11.1
    container_name: spendsense_mlflow
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    networks: [spendsense]
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/mlruns
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlruns/mlflow.db
      --artifacts-destination /mlruns/artifacts
      --serve-artifacts
      --host 0.0.0.0
      --port 5000
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health')\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # fastapi backend (port 8000)
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: spendsense_backend
    networks: [spendsense]
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - ./feedback:/app/feedback
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=/app/models/latest_model.pt
      - VOCAB_PATH=/app/data/processed/vocab.pkl
      - LABEL_ENCODER_PATH=/app/data/processed/label_encoder.pkl
      - FEATURE_BASELINE_PATH=/app/data/processed/feature_baseline.json
      - PUSHGATEWAY_URL=http://pushgateway:9091
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 30s

  # streamlit frontend (port 8501)
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: spendsense_frontend
    networks: [spendsense]
    ports:
      - "8501:8501"
    environment:
      - BACKEND_URL=http://backend:8000
      - MLFLOW_URL=http://mlflow:5000
      - AIRFLOW_URL=http://airflow:8080
      - GRAFANA_URL=http://grafana:3000
      - PUSHGATEWAY_URL=http://pushgateway:9091
      - PROMETHEUS_URL=http://prometheus:9090
      - ALERTMANAGER_URL=http://alertmanager:9093
    depends_on:
      backend:
        condition: service_healthy

  # airflow standalone with LocalExecutor (port 8080)
  airflow:
    build:
      context: .
      dockerfile: airflow/Dockerfile
    container_name: spendsense_airflow
    networks: [spendsense]
    ports:
      - "8080:8080"
    volumes:
      - airflow_db:/opt/airflow
      - ./data:/opt/airflow/project/data
      - ./models:/opt/airflow/project/models
      - ./src:/opt/airflow/project/src
      - ./params.yaml:/opt/airflow/project/params.yaml
      - ./feedback:/opt/airflow/project/feedback
    environment:
      - AIRFLOW__CORE__EXECUTOR=SequentialExecutor
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION=False
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=sqlite:////opt/airflow/airflow.db
      # allow both basic auth (CI/REST) and session auth (web UI)
      - AIRFLOW__API__AUTH_BACKENDS=airflow.api.auth.backend.basic_auth,airflow.api.auth.backend.session
      - PROJECT_ROOT=/opt/airflow/project
      - PUSHGATEWAY_URL=http://pushgateway:9091
      - GITHUB_PAT=${GITHUB_PAT:-}
      - GITHUB_REPO=r1sha13h/DA5402_Project
      - GITHUB_ACTIONS=${GITHUB_ACTIONS:-false}
      - LOCAL_DVC_REPRO=${LOCAL_DVC_REPRO:-false}
    # clean up stale PID files before start — the volume keeps them around across restarts
    command: bash -c "rm -f /opt/airflow/airflow-webserver.pid /opt/airflow/airflow-scheduler.pid /opt/airflow/airflow-triggerer.pid && airflow db migrate && airflow users create --username admin --password admin --firstname Admin --lastname User --role Admin --email admin@spendsense.local || true && airflow standalone"

  # alertmanager — email alerts (port 9093)
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: spendsense_alertmanager
    networks: [spendsense]
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml.tmpl:ro
      - ./monitoring/alertmanager-entrypoint.sh:/entrypoint.sh:ro
    environment:
      - ALERTMANAGER_SMTP_PASSWORD=${ALERTMANAGER_SMTP_PASSWORD}
    entrypoint: ["/bin/sh", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

  # pushgateway — receives metrics from batch jobs (port 9091)
  pushgateway:
    image: prom/pushgateway:v1.8.0
    container_name: spendsense_pushgateway
    networks: [spendsense]
    ports:
      - "9091:9091"
    volumes:
      - pushgateway_data:/pushgateway_data
    command:
      - "--persistence.file=/pushgateway_data/pushgateway.db"
      - "--persistence.interval=5m"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9091/-/healthy || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # prometheus — scrapes all services every 10s (port 9090)
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: spendsense_prometheus
    networks: [spendsense]
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=7d"

  # grafana dashboard (port 3001 → container 3000)
  grafana:
    image: grafana/grafana:10.4.3
    container_name: spendsense_grafana
    networks: [spendsense]
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    depends_on:
      - prometheus
