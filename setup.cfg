[flake8]
max-line-length = 100
exclude =
    __pycache__,
    .git,
    .dvc,
    venv,
    .venv,
    build,
    dist,
    *.egg-info
per-file-ignores =
    tests/*:S101
ignore = W503

[tool:pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short

[coverage:run]
source = src,backend
omit =
    tests/*
    */__init__.py
    src/models/train.py
    src/models/evaluate.py
    src/data/generate_synthetic.py

[coverage:report]
show_missing = true
fail_under = 60
